name: main-ci-cd-manual
on: push 
jobs:
 job1:
  runs-on: ubuntu-latest
  steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:ci
      - run: npm run build
  
